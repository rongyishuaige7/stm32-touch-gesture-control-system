; PlatformIO Project Configuration File
; STM32F103C8T6 Touch Gesture Control

[env:genericSTM32F103C8]
platform = ststm32@19.5.0
board = genericSTM32F103C8
framework = stm32cube

; Serial Monitor
monitor_speed = 115200

; Upload settings (ST-Link)
upload_protocol = stlink

; Build flags
build_flags =
    -D USE_HAL_DRIVER
    -D STM32F103xB
    -D HSE_VALUE=8000000
    -D HSI_VALUE=8000000

; Optional: Debug settings
debug_tool = stlink

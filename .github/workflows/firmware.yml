name: Firmware

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: touch-gesture-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Repository, source contracts and firmware
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/platformio-requirements.txt

      - name: Install PlatformIO
        run: python -m pip install --require-hashes -r .github/platformio-requirements.txt

      - name: Run repository and secret gates
        run: |
          python scripts/secret_scan.py
          python scripts/check_repo.py

      - name: Run hardware-free source contracts
        run: python -m unittest discover -s tests -v

      - name: Build STM32 firmware
        run: pio run

      - name: Upload firmware build evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stm32-touch-gesture-firmware-${{ github.sha }}
          path: |
            .pio/build/genericSTM32F103C8/firmware.bin
            .pio/build/genericSTM32F103C8/firmware.elf
          if-no-files-found: error
          retention-days: 14
